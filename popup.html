<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icons/icon.png" width="24" height="24" alt="Video Zoomer logo">
    <h1>Video Zoomer</h1>
  </div>
  <div id="zoom-level">1x</div>
  <div class="buttons">
    <button id="btn-zoom-in">
      <span class="label">Zoom In</span>
      <span class="shortcut">Ctrl+Shift+Scroll Up</span>
    </button>
    <button id="btn-zoom-out">
      <span class="label">Zoom Out</span>
      <span class="shortcut">Ctrl+Shift+Scroll Down</span>
    </button>
    <button id="btn-reset">
      <span class="label">Reset</span>
      <span class="shortcut">Ctrl+Shift+Middle Click</span>
    </button>
  </div>
  <div class="origin-section">
    <div class="origin-label">Zoom origin</div>
    <div class="origin-grid">
      <button class="origin-btn" data-origin="left top"></button>
      <button class="origin-btn" data-origin="center top"></button>
      <button class="origin-btn" data-origin="right top"></button>
      <button class="origin-btn" data-origin="left center"></button>
      <button class="origin-btn active" data-origin="center center"></button>
      <button class="origin-btn" data-origin="right center"></button>
      <button class="origin-btn" data-origin="left bottom"></button>
      <button class="origin-btn" data-origin="center bottom"></button>
      <button class="origin-btn" data-origin="right bottom"></button>
    </div>
    <div class="origin-hints">
      <div class="origin-hint-key">Ctrl + Shift + Arrow keys</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
