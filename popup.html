<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icons/icon.png" width="24" height="24" alt="Video Zoomer logo">
    <h1>Video Zoomer</h1>
  </div>
  <div id="zoom-level">1x</div>
  <div class="buttons">
    <button id="btn-zoom-in">
      <span class="label">Zoom In</span>
      <span class="shortcut">Ctrl+Shift+Z</span>
    </button>
    <button id="btn-zoom-out">
      <span class="label">Zoom Out</span>
      <span class="shortcut">Ctrl+Shift+X</span>
    </button>
    <button id="btn-reset">
      <span class="label">Reset</span>
      <span class="shortcut">Ctrl+Shift+R</span>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
